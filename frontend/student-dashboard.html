<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Hostel Complaint System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-building"></i>
                <span>HostelCare</span>
            </div>
            <div class="nav-links">
                <span id="userName" class="user-name"></span>
                <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
            </div>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="sidebar">
            <div class="sidebar-menu">
                <button class="menu-btn active" data-tab="new-complaint">
                    <i class="fas fa-plus-circle"></i> New Complaint
                </button>
                <button class="menu-btn" data-tab="my-complaints">
                    <i class="fas fa-list"></i> My Complaints
                </button>
                <button class="menu-btn" data-tab="profile">
                    <i class="fas fa-user"></i> Profile
                </button>
            </div>
        </div>
        
        <div class="main-content">
            <!-- New Complaint Tab -->
            <div id="new-complaint" class="tab-content active">
                <div class="card">
                    <h2><i class="fas fa-exclamation-triangle"></i> Submit New Complaint</h2>
                    <form id="complaintForm">
                        <div class="input-group">
                            <label>Complaint Category</label>
                            <select id="category" required>
                                <option value="">Select Category</option>
                                <option value="Electrical">⚡ Electrical (Lights, Fans, Power)</option>
                                <option value="Plumbing">💧 Plumbing (Leakage, Water Supply)</option>
                                <option value="Furniture">🪑 Furniture (Bed, Table, Chair)</option>
                                <option value="Cleaning">🧹 Cleaning (Room, Washroom)</option>
                                <option value="Internet">🌐 Internet/WiFi Issue</option>
                                <option value="Other">📝 Other Issues</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>Description</label>
                            <textarea id="description" rows="5" placeholder="Describe your problem in detail..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Submit Complaint <i class="fas fa-paper-plane"></i></button>
                    </form>
                </div>
            </div>
            
            <!-- My Complaints Tab -->
            <div id="my-complaints" class="tab-content">
                <div class="card">
                    <h2><i class="fas fa-history"></i> My Complaints</h2>
                    <div id="complaintsList" class="complaints-list">
                        <p class="loading">Loading complaints...</p>
                    </div>
                </div>
            </div>
            
            <!-- Profile Tab -->
            <div id="profile" class="tab-content">
                <div class="card">
                    <h2><i class="fas fa-user-circle"></i> My Profile</h2>
                    <div id="profileInfo" class="profile-info"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : 'https://your-backend-url.onrender.com';
        
        // Check authentication
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token || user.role !== 'student') {
            window.location.href = 'login.html';
        }
        
        // Set user name
        document.getElementById('userName').textContent = `Welcome, ${user.name}`;
        
        // Tab switching
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                
                if (tabId === 'my-complaints') {
                    loadComplaints();
                } else if (tabId === 'profile') {
                    loadProfile();
                }
            });
        });
        
        // Submit complaint
        document.getElementById('complaintForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const complaintData = {
                category: document.getElementById('category').value,
                description: document.getElementById('description').value
            };
            
            try {
                const response = await fetch(`${API_URL}/api/complaints`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(complaintData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    alert('Complaint submitted successfully!');
                    document.getElementById('complaintForm').reset();
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Connection error');
            }
        });
        
        // Load complaints
        async function loadComplaints() {
            try {
                const response = await fetch(`${API_URL}/api/my-complaints`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const complaints = await response.json();
                
                const container = document.getElementById('complaintsList');
                if (complaints.length === 0) {
                    container.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>No complaints yet. Submit your first complaint!</p></div>';
                    return;
                }
                
                container.innerHTML = complaints.map(complaint => `
                    <div class="complaint-card status-${complaint.status.toLowerCase().replace(' ', '-')}">
                        <div class="complaint-header">
                            <span class="complaint-category">${complaint.category}</span>
                            <span class="complaint-status status-${complaint.status.toLowerCase().replace(' ', '-')}">${complaint.status}</span>
                        </div>
                        <div class="complaint-body">
                            <p>${complaint.description}</p>
                            <small><i class="far fa-calendar-alt"></i> Submitted: ${new Date(complaint.createdAt).toLocaleString()}</small>
                            ${complaint.adminRemark ? `<div class="admin-remark"><strong>Admin Response:</strong> ${complaint.adminRemark}</div>` : ''}
                            ${complaint.resolvedAt ? `<small><i class="fas fa-check-circle"></i> Resolved: ${new Date(complaint.resolvedAt).toLocaleString()}</small>` : ''}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                document.getElementById('complaintsList').innerHTML = '<p class="error">Failed to load complaints</p>';
            }
        }
        
        // Load profile
        function loadProfile() {
            document.getElementById('profileInfo').innerHTML = `
                <div class="profile-card">
                    <div class="profile-avatar">
                        <i class="fas fa-user-circle fa-4x"></i>
                    </div>
                    <div class="profile-details">
                        <p><strong><i class="fas fa-user"></i> Name:</strong> ${user.name}</p>
                        <p><strong><i class="fas fa-envelope"></i> Email:</strong> ${user.email}</p>
                        <p><strong><i class="fas fa-id-card"></i> Roll Number:</strong> ${user.rollNumber}</p>
                        <p><strong><i class="fas fa-door-open"></i> Room Number:</strong> ${user.roomNumber}</p>
                    </div>
                </div>
            `;
        }
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html';
        });
        
        // Initial load
        loadComplaints();
    </script>
</body>
</html>
