<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hostel Complaint System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-building"></i>
                <span>HostelCare</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
            </div>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-key"></i>
                <h2>Login to Your Account</h2>
                <p>Access your dashboard to manage complaints</p>
            </div>
            
            <div class="role-toggle">
                <button class="role-btn active" data-role="student">Student Login</button>
                <button class="role-btn" data-role="admin">Admin Login</button>
            </div>
            
            <form id="loginForm">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Email Address" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <div class="info-text" id="adminInfo" style="display: none;">
                    <i class="fas fa-info-circle"></i> Default Admin: admin@hostel.com | Password: admin123
                </div>
                <button type="submit" class="btn btn-primary btn-block">Login <i class="fas fa-arrow-right"></i></button>
            </form>
            <div class="auth-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname === 'https://hostel-complaint-kb17.onrender.com';
        
        let selectedRole = 'student';
        
        // Role toggle
        document.querySelectorAll('.role-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.dataset.role;
                
                const adminInfo = document.getElementById('adminInfo');
                if (selectedRole === 'admin') {
                    adminInfo.style.display = 'block';
                } else {
                    adminInfo.style.display = 'none';
                }
            });
        });
        
        // Check for default role from landing page
        const defaultRole = localStorage.getItem('defaultLoginRole');
        if (defaultRole === 'admin') {
            document.querySelector('.role-btn[data-role="admin"]').click();
            localStorage.removeItem('defaultLoginRole');
        }
        
        // Login form submit
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const response = await fetch(`${API_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role: selectedRole })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    
                    if (data.user.role === 'student') {
                        window.location.href = 'student-dashboard.html';
                    } else {
                        window.location.href = 'admin-dashboard.html';
                    }
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Connection error. Make sure the server is running.');
            }
        });
    </script>
</body>
</html>
